# Configuration for Leap-Myo Data Collection Pipeline

# Data Collection Parameters
episode_duration: 5.0 # Duration to record per episode (seconds)
max_episodes: 20 # Maximum number of episodes to record
subject_id: "user_1" # Subject or session identifier
pose_name: "test_pose" # Name of the pose/activity being recorded
save_dir: "datasets" # Root directory where episodes are saved

# Visualization
visualize: true # True to show a live viewer during data collection
visualizer_backend: "local" # "local" for the dark-mode Matplotlib dashboard, "rerun" for the old Rerun path
web_viewer: false # Only used when visualizer_backend is "rerun"
